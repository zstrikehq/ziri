services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3100:3100"
    volumes:
      - ziri-data:/data
    environment:
      - CONFIG_DIR=/data
      - PORT=3100
      - HOST=0.0.0.0
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  ziri-data:
