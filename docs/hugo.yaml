# Hugo configuration file
baseURL: https://docs.ziri.com/
languageCode: en-us
title: Ziri

# import hextra as module
module:
    imports:
        - path: github.com/imfing/hextra

markup:
    # allow raw html
    goldmark:
        renderer:
            unsafe: true

    # enable hextra syntax highlight
    highlight:
        noClasses: false

menu:
    main:
        - name: Getting Started
          pageRef: /docs/getting-started/introduction
          weight: 1
        - name: API Reference
          pageRef: /docs/api-reference
          weight: 2
        - name: SDK
          pageRef: /docs/sdk
          weight: 3
        - name: Guides
          pageRef: /docs/guides/policy-examples
          weight: 4
        - name: Deployment
          pageRef: /docs/deployment/docker-compose
          weight: 5
        - name: Search
          weight: 6
          params:
              type: search
        - name: GitHub
          weight: 7
          url: "https://github.com/imfing/hextra-starter-template"
          params:
              icon: github

params:
    navbar:
        displayTitle: true
        displayLogo: false

    footer:
        displayCopyright: false
        displayPoweredBy: false

    editURL:
        enable: false
